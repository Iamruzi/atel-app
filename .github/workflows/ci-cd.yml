name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
      release_notes:
        description: 'Release notes'
        required: false

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION=${{ github.event.inputs.version }}
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          BUILD_NUMBER=${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

  build-android:
    name: Build Android
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Update version
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          if [ "${{ matrix.build-type }}" == "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
      
      - name: Rename APK
        run: |
          BUILD_TYPE=${{ matrix.build-type }}
          if [ "$BUILD_TYPE" == "release" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk ATEL-v${{ needs.version.outputs.version }}-release.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk ATEL-v${{ needs.version.outputs.version }}-debug.apk
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: android-${{ matrix.build-type }}
          path: ATEL-*.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync Capacitor
        run: npx cap sync ios
      
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install || echo "No Podfile"
      
      - name: Build iOS Simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath $PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../../ATEL-v${{ needs.version.outputs.version }}-simulator.zip App.app
      
      - name: Upload iOS
        uses: actions/upload-artifact@v3
        with:
          name: ios-simulator
          path: ATEL-*.zip
          retention-days: 30

  create-release:
    name: Create Release
    needs: [version, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## ATEL v${{ needs.version.outputs.version }}
            
            Build: ${{ needs.version.outputs.build_number }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
