name: CI/CD Pipeline

on:
  push:
    branches: 
      - main        # 生产环境
      - develop     # 开发环境
    tags:
      - 'v*'        # 版本标签
  pull_request:
    branches: 
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
      release_notes:
        description: 'Release notes'
        required: false

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      environment: ${{ steps.version.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION=${{ github.event.inputs.version }}
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          BUILD_NUMBER=${{ github.run_number }}
          
          # 判断环境
          if [[ $GITHUB_REF == refs/heads/main ]] || [[ $GITHUB_REF == refs/tags/* ]]; then
            ENVIRONMENT="production"
          elif [[ $GITHUB_REF == refs/heads/develop ]]; then
            ENVIRONMENT="development"
            VERSION="${VERSION}-dev"
          else
            ENVIRONMENT="feature"
            VERSION="${VERSION}-beta"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER, Environment: $ENVIRONMENT"

  build-android:
    name: Build Android (${{ matrix.build-type }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Update version
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          if [ "${{ matrix.build-type }}" == "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
      
      - name: Rename APK
        run: |
          BUILD_TYPE=${{ matrix.build-type }}
          ENV=${{ needs.version.outputs.environment }}
          if [ "$BUILD_TYPE" == "release" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk ATEL-v${{ needs.version.outputs.version }}-${ENV}-release.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk ATEL-v${{ needs.version.outputs.version }}-${ENV}-debug.apk
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.build-type }}-${{ needs.version.outputs.environment }}
          path: ATEL-*.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync Capacitor
        run: npx cap sync ios
      
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install || echo "No Podfile"
      
      - name: Build iOS Simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath $PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../../ATEL-v${{ needs.version.outputs.version }}-${{ needs.version.outputs.environment }}-simulator.zip App.app
      
      - name: Upload iOS
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ needs.version.outputs.environment }}
          path: ATEL-*.zip
          retention-days: 30

  create-release:
    name: Create Release
    needs: [version, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="Initial release"
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## ATEL v${{ needs.version.outputs.version }}
            
            **Build Number**: ${{ needs.version.outputs.build_number }}
            **Environment**: ${{ needs.version.outputs.environment }}
            
            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### Downloads
            - Android Release APK
            - Android Debug APK
            - iOS Simulator build
          files: |
            artifacts/**/*.apk
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
